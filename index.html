<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GTS버거 팀 주문 대시보드</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #E85D04;
            --primary-dark: #DC2F02;
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --bg-card-hover: #1a2745;
            --text: #eee;
            --text-muted: #8892b0;
            --accent: #F48C06;
            --success: #06D6A0;
            --danger: #EF476F;
            --border: #2a2a4a;
        }

        body {
            font-family: 'Segoe UI', -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            padding: 20px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .header-summary {
            display: flex;
            gap: 24px;
            font-size: 0.95rem;
        }

        .header-summary .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-summary .stat-value {
            font-size: 1.3rem;
            font-weight: 700;
        }

        .header-summary .stat-label {
            font-size: 0.75rem;
            opacity: 0.85;
        }

        .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.75rem;
            opacity: 0.9;
            background: rgba(255,255,255,0.15);
            padding: 4px 10px;
            border-radius: 12px;
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            animation: pulse 2s infinite;
        }

        .sync-dot.offline { background: var(--danger); animation: none; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .app-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: calc(100vh - 72px);
        }

        /* Sidebar */
        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-header h2 {
            font-size: 1rem;
            font-weight: 600;
        }

        .add-member-form {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        .add-member-form input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.85rem;
            outline: none;
        }

        .add-member-form input:focus {
            border-color: var(--primary);
        }

        .add-member-form button {
            padding: 8px 14px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .add-member-form button:hover {
            background: var(--primary-dark);
        }

        .member-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .member-item {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s;
            gap: 10px;
            margin-bottom: 4px;
        }

        .member-item:hover {
            background: var(--bg-card-hover);
        }

        .member-item.active {
            background: rgba(232, 93, 4, 0.15);
            border: 1px solid rgba(232, 93, 4, 0.3);
        }

        .member-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
            flex-shrink: 0;
        }

        .member-info {
            flex: 1;
            min-width: 0;
        }

        .member-name {
            font-weight: 600;
            font-size: 0.9rem;
        }

        .member-order-count {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .member-delete {
            opacity: 0;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 4px;
            transition: opacity 0.15s;
        }

        .member-item:hover .member-delete {
            opacity: 1;
        }

        /* Main Content */
        .main-content {
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .tabs {
            display: flex;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
        }

        .tab {
            padding: 14px 20px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
            border-bottom: 2px solid transparent;
            transition: all 0.15s;
        }

        .tab:hover {
            color: var(--text);
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
        }

        /* Menu Grid */
        .menu-category {
            margin-bottom: 32px;
        }

        .menu-category h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 14px;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 12px;
        }

        .menu-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.15s;
            position: relative;
        }

        .menu-card:hover {
            border-color: var(--primary);
            background: var(--bg-card-hover);
            transform: translateY(-1px);
        }

        .menu-card.selected {
            border-color: var(--success);
            background: rgba(6, 214, 160, 0.08);
        }

        .menu-card .check-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 22px;
            height: 22px;
            border-radius: 50%;
            background: var(--success);
            color: white;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .menu-card.selected .check-badge {
            display: flex;
        }

        .menu-card-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 4px;
        }

        .menu-card-desc {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .menu-card-price {
            font-weight: 700;
            color: var(--accent);
            font-size: 0.95rem;
        }

        .menu-card-qty {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .qty-value {
            font-weight: 600;
            min-width: 20px;
            text-align: center;
        }

        /* No member selected */
        .no-member-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            gap: 12px;
        }

        .no-member-msg .icon {
            font-size: 3rem;
        }

        .help-guide {
            text-align: left;
            max-width: 420px;
            width: 100%;
        }

        .help-guide h3 {
            font-size: 1.1rem;
            color: var(--text);
            margin-bottom: 16px;
            font-weight: 700;
        }

        .help-step {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            margin-bottom: 16px;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .help-step-num {
            flex-shrink: 0;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .help-step-text {
            font-size: 0.95rem;
            color: var(--text);
            line-height: 1.5;
        }

        .help-step-text .sub {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 4px;
        }

        /* Order Summary */
        .summary-view {
            display: none;
        }

        .summary-table {
            width: 100%;
            border-collapse: collapse;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
        }

        .summary-table th, .summary-table td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        .summary-table th {
            background: rgba(232, 93, 4, 0.1);
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--accent);
        }

        .summary-table td {
            font-size: 0.9rem;
        }

        .summary-table tr:last-child td {
            border-bottom: none;
        }

        .summary-total-row {
            background: rgba(232, 93, 4, 0.05);
            font-weight: 700;
        }

        .summary-member-section {
            margin-bottom: 24px;
        }

        .summary-member-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .summary-member-name {
            font-weight: 700;
            font-size: 1.05rem;
        }

        .summary-member-total {
            color: var(--accent);
            font-weight: 700;
        }

        .grand-total {
            background: linear-gradient(135deg, var(--primary-dark), var(--primary));
            border-radius: 12px;
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 24px;
        }

        .grand-total-label {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .grand-total-value {
            font-size: 1.6rem;
            font-weight: 700;
        }

        /* Copy button */
        .copy-btn {
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .copy-btn:hover {
            background: var(--primary-dark);
        }

        /* Firebase Setup Screen */
        .setup-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
        }

        .setup-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            max-width: 560px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .setup-card h2 {
            font-size: 1.4rem;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setup-card p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .setup-card .step {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .setup-card .step-num {
            display: inline-flex;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            font-size: 0.75rem;
            font-weight: 700;
            align-items: center;
            justify-content: center;
            margin-right: 8px;
        }

        .setup-card .step-title {
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        .setup-card .step-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .setup-card .step-desc a {
            color: var(--accent);
            text-decoration: none;
        }

        .setup-card .step-desc a:hover {
            text-decoration: underline;
        }

        .setup-card .step-desc code {
            background: rgba(232,93,4,0.15);
            padding: 1px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
            color: var(--accent);
        }

        .config-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.8rem;
            resize: vertical;
            min-height: 160px;
            outline: none;
            margin-top: 12px;
        }

        .config-input:focus {
            border-color: var(--primary);
        }

        .config-input::placeholder {
            color: var(--text-muted);
            opacity: 0.5;
        }

        .setup-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .setup-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .setup-btn-primary {
            background: var(--primary);
            color: white;
        }

        .setup-btn-primary:hover {
            background: var(--primary-dark);
        }

        .setup-btn-secondary {
            background: var(--bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
        }

        .setup-btn-secondary:hover {
            color: var(--text);
            border-color: var(--text-muted);
        }

        .setup-error {
            color: var(--danger);
            font-size: 0.8rem;
            margin-top: 8px;
            display: none;
        }

        .settings-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            opacity: 0.7;
            transition: opacity 0.15s;
        }

        .settings-btn:hover {
            opacity: 1;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* Responsive */
        @media (max-width: 768px) {
            .app-layout {
                grid-template-columns: 1fr;
            }
            .sidebar {
                max-height: 200px;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>🍔 GTS버거 팀 주문</h1>
        <div class="header-right">
            <div class="header-summary">
                <div class="stat">
                    <span class="stat-value" id="totalMembers">0</span>
                    <span class="stat-label">팀원</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="totalOrders">0</span>
                    <span class="stat-label">주문</span>
                </div>
                <div class="stat">
                    <span class="stat-value" id="totalPrice">₩0</span>
                    <span class="stat-label">총 금액</span>
                </div>
            </div>
            <div class="sync-status" id="syncStatus">
                <div class="sync-dot offline" id="syncDot"></div>
                <span id="syncLabel">오프라인</span>
            </div>
        </div>
    </header>

    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>팀원 목록</h2>
            </div>
            <div class="add-member-form">
                <input type="text" id="newMemberInput" placeholder="이름 입력" />
                <button onclick="addMember()">추가</button>
            </div>
            <div class="member-list" id="memberList"></div>
        </aside>

        <main class="main-content">
            <div class="tabs">
                <div class="tab active" data-tab="menu" onclick="switchTab('menu')">메뉴 선택</div>
                <div class="tab" data-tab="summary" onclick="switchTab('summary')">주문 요약</div>
            </div>

            <div class="content-area" id="contentArea">
                <div id="menuView">
                    <div class="no-member-msg" id="noMemberMsg">
                        <div class="icon">🍔</div>
                        <div class="help-guide">
                            <h3>주문 방법 안내</h3>
                            <div class="help-step">
                                <div class="help-step-num">1</div>
                                <div class="help-step-text">좌측에서 <b>자기 이름</b>을 입력하고 추가</div>
                            </div>
                            <div class="help-step">
                                <div class="help-step-num">2</div>
                                <div class="help-step-text">추가된 <b>자기 이름</b>을 클릭</div>
                            </div>
                            <div class="help-step">
                                <div class="help-step-num">3</div>
                                <div class="help-step-text">원하는 메뉴 선택!<span class="sub">1인 1버거 + 사이드/음료/세트 가능 ☕ 커피는 별도 주문 예정</span></div>
                            </div>
                        </div>
                    </div>
                    <div id="menuContainer" style="display:none;"></div>
                </div>
                <div class="summary-view" id="summaryView"></div>
            </div>
        </main>
    </div>

<!-- Firebase SDK (compat) -->

// =====================================================
// FIREBASE INIT & REALTIME SYNC
// =====================================================
function initFirebase(config) {
    try {
        // Avoid re-init
        if (firebase.apps.length === 0) {
            firebase.initializeApp(config);
        }

        const db = firebase.database();
        dbRef = db.ref('gts-burger-order');

        // Listen for real-time changes
        dbRef.child('members').on('value', (snapshot) => {
            const data = snapshot.val();
            // Convert Firebase object to array
            if (data) {
                members = Object.keys(data).map(key => {
                    const m = data[key];
                    return { ...m, id: key, orders: m.orders || {} };
                });
            } else {
                members = [];
            }

            // If selected member was removed by someone else, deselect
            if (selectedMemberId && !members.find(m => m.id === selectedMemberId)) {
                selectedMemberId = null;
            }

            render();
        });

        // Connection state
        const connRef = firebase.database().ref('.info/connected');
        connRef.on('value', (snap) => {
            updateSyncStatus(snap.val() === true);
        });

        firebaseReady = true;
        updateSyncStatus(true);
    } catch (e) {
        console.error('Firebase init error:', e);
        updateSyncStatus(false);
        loadOfflineState();
        render();
    }
}

function updateSyncStatus(connected) {
    const dot = document.getElementById('syncDot');
    const label = document.getElementById('syncLabel');
    if (connected && firebaseReady) {
        dot.classList.remove('offline');
        label.textContent = '실시간 동기화';
    } else {
        dot.classList.add('offline');
        label.textContent = firebaseReady ? '연결 끊김' : '오프라인';
    }
}

// =====================================================
// DATA OPERATIONS (Firebase or localStorage)
// =====================================================
function saveMemberToFirebase(member) {
    if (!firebaseReady || !dbRef) return;
    const { id, ...data } = member;
    dbRef.child('members').child(id).set(data);
}

function removeMemberFromFirebase(id) {
    if (!firebaseReady || !dbRef) return;
    dbRef.child('members').child(id).remove();
}

function saveAllToFirebase() {
    if (!firebaseReady || !dbRef) return;
    const data = {};
    members.forEach(m => {
        const { id, ...rest } = m;
        data[id] = rest;
    });
    dbRef.child('members').set(data);
}

// Offline fallback
function loadOfflineState() {
    try {
        const state = JSON.parse(localStorage.getItem('gts_order_state') || 'null');
        if (state) {
            members = state.members || [];
            selectedMemberId = state.selectedMemberId;
        }
    } catch {}
}

function saveOfflineState() {
    localStorage.setItem('gts_order_state', JSON.stringify({ members, selectedMemberId }));
}

// =====================================================
// MEMBER & ORDER OPERATIONS
// =====================================================
function generateId() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

function addMember() {
    const input = document.getElementById('newMemberInput');
    const name = input.value.trim();
    if (!name) return;

    const member = {
        id: generateId(),
        name,
        color: AVATAR_COLORS[members.length % AVATAR_COLORS.length],
        orders: {}
    };

    if (firebaseReady) {
        // Firebase will update via listener
        const { id, ...data } = member;
        dbRef.child('members').child(id).set(data);
    } else {
        members.push(member);
        saveOfflineState();
        render();
    }

    input.value = '';
}

document.getElementById('newMemberInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addMember();
});

function removeMember(id) {
    if (firebaseReady) {
        removeMemberFromFirebase(id);
    } else {
        members = members.filter(m => m.id !== id);
        saveOfflineState();
    }
    if (selectedMemberId === id) selectedMemberId = null;
    render();
}

function selectMember(id) {
    selectedMemberId = id;
    render();
}

function getMember(id) {
    return members.find(m => m.id === id);
}

function toggleItem(menuKey, index) {
    const member = getMember(selectedMemberId);
    if (!member) return;

    const key = `${menuKey}::${index}`;
    if (member.orders[key]) {
        delete member.orders[key];
    } else {
        member.orders[key] = 1;
    }

    if (firebaseReady) {
        saveMemberToFirebase(member);
    } else {
        saveOfflineState();
    }
    render();
}

function changeQty(menuKey, index, delta) {
    const member = getMember(selectedMemberId);
    if (!member) return;

    const key = `${menuKey}::${index}`;
    const current = member.orders[key] || 0;
    const next = current + delta;
    if (next <= 0) {
        delete member.orders[key];
    } else {
        member.orders[key] = next;
    }

    if (firebaseReady) {
        saveMemberToFirebase(member);
    } else {
        saveOfflineState();
    }
    render();
}

// =====================================================
// FORMATTING & CALCULATIONS
// =====================================================
function formatPrice(n) {
    return '₩' + n.toLocaleString('ko-KR');
}

function getMemberTotal(member) {
    let total = 0;
    for (const [key, qty] of Object.entries(member.orders || {})) {
        const [cat, idx] = key.split('::');
        const item = MENU_DATA[cat]?.[parseInt(idx)];
        if (item) total += item.price * qty;
    }
    return total;
}

function getGrandTotal() {
    return members.reduce((sum, m) => sum + getMemberTotal(m), 0);
}

function getTotalOrderCount() {
    return members.reduce((sum, m) => sum + Object.values(m.orders || {}).reduce((s, q) => s + q, 0), 0);
}

// =====================================================
// TABS
// =====================================================
function switchTab(tab) {
    document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
    document.getElementById('menuView').style.display = tab === 'menu' ? '' : 'none';
    document.getElementById('summaryView').style.display = tab === 'summary' ? 'block' : 'none';
    if (tab === 'summary') renderSummary();
}

// =====================================================
// RENDERING
// =====================================================
function renderMembers() {
    const list = document.getElementById('memberList');
    list.innerHTML = members.map(m => {
        const orderCount = Object.values(m.orders || {}).reduce((s, q) => s + q, 0);
        const total = getMemberTotal(m);
        return `
            <div class="member-item ${m.id === selectedMemberId ? 'active' : ''}" onclick="selectMember('${m.id}')">
                <div class="member-avatar" style="background:${m.color}">${m.name[0]}</div>
                <div class="member-info">
                    <div class="member-name">${m.name}</div>
                    <div class="member-order-count">${orderCount > 0 ? `${orderCount}개 · ${formatPrice(total)}` : '미선택'}</div>
                </div>
                <button class="member-delete" onclick="event.stopPropagation();removeMember('${m.id}')" title="삭제">✕</button>
            </div>
        `;
    }).join('');
}

function renderMenu() {
    const member = getMember(selectedMemberId);
    const noMsg = document.getElementById('noMemberMsg');
    const container = document.getElementById('menuContainer');

    if (!member) {
        noMsg.style.display = 'flex';
        container.style.display = 'none';
        return;
    }

    noMsg.style.display = 'none';
    container.style.display = '';

    const categoryIcons = {
        "베스트 버거": "⭐", "싱글 버거": "🍔", "더블 버거": "🍔🍔",
        "스페셜 버거": "✨", "사이드": "🍟", "음료": "🥤",
        "쉐이크": "🥛", "세트": "🎁"
    };

    container.innerHTML = Object.entries(MENU_DATA).map(([category, items]) => `
        <div class="menu-category">
            <h3>${categoryIcons[category] || ''} ${category}</h3>
            <div class="menu-grid">
                ${items.map((item, i) => {
                    const key = `${category}::${i}`;
                    const qty = (member.orders || {})[key] || 0;
                    return `
                        <div class="menu-card ${qty > 0 ? 'selected' : ''}" onclick="toggleItem('${category}', ${i})">
                            <div class="check-badge">${qty}</div>
                            <div class="menu-card-name">${item.name}</div>
                            ${item.desc ? `<div class="menu-card-desc">${item.desc}</div>` : ''}
                            <div class="menu-card-price">${formatPrice(item.price)}</div>
                            ${qty > 0 ? `
                                <div class="menu-card-qty" onclick="event.stopPropagation()">
                                    <button class="qty-btn" onclick="changeQty('${category}', ${i}, -1)">−</button>
                                    <span class="qty-value">${qty}</span>
                                    <button class="qty-btn" onclick="changeQty('${category}', ${i}, 1)">+</button>
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('')}
            </div>
        </div>
    `).join('');
}

function renderSummary() {
    const view = document.getElementById('summaryView');
    const orderedMembers = members.filter(m => Object.keys(m.orders || {}).length > 0);

    if (orderedMembers.length === 0) {
        view.innerHTML = '<div class="no-member-msg"><div class="icon">📋</div><div>아직 주문이 없습니다</div></div>';
        return;
    }

    let html = '<button class="copy-btn" onclick="copySummary()">📋 주문 내용 복사</button>';

    orderedMembers.forEach(m => {
        const total = getMemberTotal(m);
        html += `
            <div class="summary-member-section">
                <div class="summary-member-header">
                    <div class="member-avatar" style="background:${m.color};width:30px;height:30px;font-size:0.75rem">${m.name[0]}</div>
                    <span class="summary-member-name">${m.name}</span>
                    <span class="summary-member-total">${formatPrice(total)}</span>
                </div>
                <table class="summary-table">
                    <thead><tr><th>메뉴</th><th>수량</th><th>가격</th></tr></thead>
                    <tbody>
        `;

        for (const [key, qty] of Object.entries(m.orders || {})) {
            const [cat, idx] = key.split('::');
            const item = MENU_DATA[cat]?.[parseInt(idx)];
            if (!item) continue;
            html += `<tr><td>${item.name}</td><td>${qty}</td><td>${formatPrice(item.price * qty)}</td></tr>`;
        }

        html += `
                    <tr class="summary-total-row"><td>소계</td><td></td><td>${formatPrice(total)}</td></tr>
                    </tbody></table></div>
        `;
    });

    html += `
        <div class="grand-total">
            <span class="grand-total-label">전체 합계</span>
            <span class="grand-total-value">${formatPrice(getGrandTotal())}</span>
        </div>
    `;

    view.innerHTML = html;
}

function copySummary() {
    const orderedMembers = members.filter(m => Object.keys(m.orders || {}).length > 0);
    let text = '🍔 GTS버거 팀 주문\n' + '='.repeat(30) + '\n\n';

    orderedMembers.forEach(m => {
        text += `▸ ${m.name}\n`;
        for (const [key, qty] of Object.entries(m.orders || {})) {
            const [cat, idx] = key.split('::');
            const item = MENU_DATA[cat]?.[parseInt(idx)];
            if (!item) continue;
            text += `  - ${item.name} x${qty} (${formatPrice(item.price * qty)})\n`;
        }
        text += `  소계: ${formatPrice(getMemberTotal(m))}\n\n`;
    });

    text += `${'='.repeat(30)}\n총 합계: ${formatPrice(getGrandTotal())}`;

    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('.copy-btn');
        btn.textContent = '✅ 복사 완료!';
        setTimeout(() => btn.textContent = '📋 주문 내용 복사', 1500);
    });
}

function updateHeaderStats() {
    document.getElementById('totalMembers').textContent = members.length;
    document.getElementById('totalOrders').textContent = getTotalOrderCount();
    document.getElementById('totalPrice').textContent = formatPrice(getGrandTotal());
}

function render() {
    renderMembers();
    renderMenu();
    updateHeaderStats();
    if (document.querySelector('.tab[data-tab="summary"]').classList.contains('active')) {
        renderSummary();
    }
}

    initFirebase(FIREBASE_CONFIG);
